services:
  - type: web
    name: serialhub-bot
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: serialhub
      - key: ADMIN_IDS
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: UPI_ID
        sync: false
      - key: PAYMENT_NAME
        value: Serial Hub
      - key: RESTART_ON_CRASH
        value: "true"
