<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Serial Hub Admin{% endblock %}</title>
  <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body>
  {% if admin_id %}
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Serial Hub</div>
      <nav>
        <a href="/admin/" class="{% if path == '/admin/' %}active{% endif %}">Dashboard</a>
        <a href="/admin/users" class="{% if path.startswith('/admin/users') %}active{% endif %}">Users</a>
        <a href="/admin/payments" class="{% if path.startswith('/admin/payments') %}active{% endif %}">Payments</a>
        <a href="/admin/episodes" class="{% if path.startswith('/admin/episodes') %}active{% endif %}">Episodes</a>
        <a href="/admin/requests" class="{% if path.startswith('/admin/requests') %}active{% endif %}">Requests</a>
        <a href="/admin/support" class="{% if path.startswith('/admin/support') %}active{% endif %}">Support</a>
        <a href="/admin/broadcast" class="{% if path.startswith('/admin/broadcast') %}active{% endif %}">Broadcast</a>
      </nav>
      <form action="/admin/logout" method="post" class="logout-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="btn btn-ghost">Log out</button>
      </form>
    </aside>
    <main class="content">
      {% if flash %}
      <div class="flash">{{ flash }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
  {% block body %}{% endblock %}
  {% endif %}
</body>
</html>
