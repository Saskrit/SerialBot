{% macro icon(name, size=20, class='') %}
<svg class="icon {{ class }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  {% if name == 'tv' %}
  <rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/>
  {% elif name == 'send' %}
  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
  {% elif name == 'home' %}
  <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/>
  {% elif name == 'grid' %}
  <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
  {% elif name == 'search' %}
  <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
  {% elif name == 'crown' %}
  <path d="M3 18h18"/><path d="M5 18 7 8l5 4 5-4 2 10"/><circle cx="7" cy="6" r="1"/><circle cx="12" cy="4" r="1"/><circle cx="17" cy="6" r="1"/>
  {% elif name == 'users' %}
  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  {% elif name == 'play' %}
  <polygon points="8 5 19 12 8 19 8 5"/>
  {% elif name == 'calendar' %}
  <rect x="3" y="5" width="18" height="16" rx="2"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="3" y1="11" x2="21" y2="11"/>
  {% elif name == 'smartphone' %}
  <rect x="6" y="2" width="12" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/>
  {% elif name == 'message' %}
  <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
  {% elif name == 'film' %}
  <rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="8" x2="22" y2="8"/><line x1="2" y1="16" x2="22" y2="16"/><line x1="6" y1="4" x2="6" y2="8"/><line x1="10" y1="4" x2="10" y2="8"/>
  {% elif name == 'gift' %}
  <rect x="3" y="8" width="18" height="13" rx="1"/><path d="M12 8v13"/><path d="M3 12h18"/><path d="M12 8c-2-2.5-4-3-4-5a2 2 0 0 1 4 0c0 2-2 2.5-4 5z"/><path d="M12 8c2-2.5 4-3 4-5a2 2 0 0 0-4 0c0 2 2 2.5 4 5z"/>
  {% elif name == 'check' %}
  <polyline points="20 6 9 17 4 12"/>
  {% elif name == 'chevron-right' %}
  <polyline points="9 18 15 12 9 6"/>
  {% elif name == 'eye' %}
  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
  {% elif name == 'layers' %}
  <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
  {% endif %}
</svg>
{% endmacro %}
